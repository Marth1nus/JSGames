<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordle</title>
    <style>
      #wordle {
        & /* Variables */ {
          --words-count: 6;
          --word-length: 5;
          --letter-width: 1em;
          --pallet-0: #185;
          --pallet-1: #eee;
          --pallet-used: yellow;
          --pallet-correct: cyan;
        }
        & /* #wordle */ {
          color: var(--pallet-0);
        }
        & > .border {
          border: 0.5em inset color-mix(in srgb, currentColor 40%, transparent);
          background-color: color-mix(in srgb, currentColor 20%, transparent);
          border-radius: 1em;
          padding: 1em;
          display: grid;
          grid-template-columns: 1fr;
          justify-content: center;
          gap: 0.5em;
        }
        & button {
          background-color: var(--pallet-1);
          border: 0.2em outset color-mix(in srgb, currentColor 60%, transparent);
          border-radius: 0.5em;
          color: inherit;
          &:focus,
          &:hover {
            background-color: color-mix(in srgb, var(--pallet-1) 80%, transparent);
          }
          &:active {
            background-color: color-mix(in srgb, var(--pallet-1) 60%, transparent);
            border-radius: 0.6em;
            border-style: inset;
          }
        }
        & header {
          text-align: center;
          background-color: color-mix(in srgb, var(--pallet-1) 99%, transparent);
          border-radius: 1em;
          font-size: large;
          padding: 0.2em;
        }
        & ol.letters {
          display: grid;
          grid-template:
            repeat(var(--words-count), 1fr) /
            repeat(var(--word-length), auto);
          justify-content: center;
          gap: 0.5em 0.05em;
          list-style: none;
          padding: 0;
          margin: 0;
          & > li {
            font-size: x-large;
            text-align: center;
            background-color: color-mix(in srgb, var(--pallet-1) 99%, black);
            width: var(--letter-width);
            height: var(--letter-width);
            padding: 0.3em;
            border: 0.1em outset color-mix(in srgb, currentColor 60%, transparent);
            border-radius: 0.3em;
            &.submitted {
              background-color: color-mix(in srgb, var(--pallet-1) 80%, black);
            }
            &.submitted.used {
              background-color: var(--pallet-used);
            }
            &.submitted.used.correct {
              background-color: var(--pallet-correct);
            }
          }
        }
        & .notify {
          text-align: center;
          transition: opacity 1s ease;
        }
        & .keyboard {
          width: 90vw;
          max-width: 24em;
          display: grid;
          grid-template: repeat(3, 1fr) / repeat(20, 1fr);
          gap: 0.05em;
          & > button {
            aspect-ratio: 1;
            background-color: color-mix(in srgb, var(--pallet-1) 99%, black);
            & /* Grid Row Offsets */ {
              grid-column: auto / span 2;
              &:nth-of-type(1) {
                grid-column: 1 / span 2;
              }
              &:nth-of-type(11) {
                grid-column: 2 / span 2;
              }
              &:nth-of-type(20) {
                grid-column: 3 / span 2;
              }
            }
            &.submitted {
              background-color: color-mix(in srgb, var(--pallet-1) 80%, black);
            }
            &.submitted.used {
              background-color: var(--pallet-used);
            }
            &.submitted.used.correct {
              background-color: var(--pallet-correct);
            }
          }
        }
        & .buttons {
          display: grid;
          grid-template: 2fr 1fr 1fr / repeat(10, 1fr);
          grid-template-areas:
            '. a a a . . b b b .'
            '. . . . . . . . . .'
            'c c . . . . . . d d';
          &>* /* Grid Offsets */ {
            &:nth-child(1) {
              grid-area: a;
            }
            &:nth-child(2) {
              grid-area: b;
            }
            &:nth-child(3) {
              grid-area: c;
            }
            &:nth-child(4) {
              grid-area: d;
            }
          }
        }
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-width: 100vw;
        min-height: 100vh;
      }
    </style>
    <script type="module">
      const DOMContentLoaded = new Promise(resolve =>
        document.readyState !== 'loading'
          ? resolve()
          : document.addEventListener('DOMContentLoaded', resolve, { once: true }),
      )
      const wordLength = 5
      const wordsCount = 6
      const firstTimePopulateDOM = async () => {
        await DOMContentLoaded
        document.querySelector('#wordle .letters').replaceChildren(
          ...Array.from({ length: wordsCount }).flatMap((c, i) => {
            const li = document.createElement('li')
            li.className = 'letter'
            li.innerText = 'WORDLE'[i] || ''
            return Array.from({ length: wordLength }, () => li.cloneNode(true))
          }),
        )
        document.querySelector('#wordle .keyboard').replaceChildren(
          ...Array.from('qwertyuiop asdfghjkl zxcvbnm←'.toUpperCase(), c => {
            if (c === ' ') return
            const btn = document.createElement('button')
            btn.innerText = c
            return btn
          }).filter(Boolean),
        )
        document.querySelectorAll('#wordle button').forEach(btn => {
          btn.addEventListener('click', generalButtonOnClick)
        })
        document.addEventListener('keydown', documentOnKey)
      }
      /** @param {Url} url */
      const fetchWords = async url => {
        const response = await fetch(url)
        const text = await response.text()
        const lines = text.split(/\r?\n/)
        const [headerRow, ...rows] = lines.map(line => line.split(/,/).map(word => word.trim()))
        const wordHeaderIndex = headerRow.indexOf('word')
        const words = rows.map(row => row[wordHeaderIndex]).filter(Boolean)
        return new Set(words)
      }
      const [words, ..._] = await Promise.all([
        fetchWords('data/wordle/words.csv'),
        firstTimePopulateDOM(),
        DOMContentLoaded,
      ])

      const makeWordleGame = (wordleDivId = 'wordle') => ({
        words,
        wordsCount,
        wordLength,
        i: 0,
        result: '',
        solution: '',
        get gameOver() {
          return this.i >= this.wordsCount || Boolean(this.result)
        },
        get word() {
          return this.gameOver
            ? this.solution
            : this.wordLetters
                .map(letter => letter.textContent[0])
                .filter(Boolean)
                .join('')
                .toLowerCase()
        },
        set word(word) {
          if (this.gameOver) throw new Error(`wordle.word = "${word}" is disallow after game-over`)
          const { wordLetters } = this
          if (!(/^[a-zA-Z]*$/.test(word) && word.length <= wordLetters.length))
            throw new Error(`"${word}" is not a valid ${wordLetters.length}-letter word`)
          for (let j = 0; j < wordLetters.length; j++) {
            wordLetters[j].textContent = (word[j] || '').toUpperCase()
          }
        },

        divId: wordleDivId,
        get letters() {
          return [...document.querySelectorAll(`#${this.divId} ol.letters > li`)] //
            .filter(li => li instanceof HTMLLIElement)
        },
        get wordLetters() {
          const { letters, i, wordLength, gameOver } = this
          return gameOver ? [] : letters.slice((i + 0) * wordLength, (i + 1) * wordLength)
        },
        get keyboardKeys() {
          return [...document.querySelectorAll(`#${this.divId} .keyboard > button`)] //
            .filter(button => button instanceof HTMLButtonElement)
        },
        notify(message = 'Guess the Word') {
          const notify = document.querySelector(`#${this.divId} .notify`)
          if (!(notify instanceof HTMLElement)) throw new Error('Missing Notify div')
          notify.textContent = message
          clearTimeout(this.notifyTimeout)
          this.notifyTimeout = setTimeout(() => (notify.style.opacity = 0.5), 3000)
        },

        reset() {
          const { letters } = this
          for (const letter of letters) {
            letter.textContent = ''
            letter.className = ''
          }
          const { keyboardKeys } = this
          for (const key of keyboardKeys) {
            key.className = ''
          }
          this.i = 0
          this.result = ''
          this.solution = [...this.words][Math.floor(Math.random() * this.words.size)]
          this.notify()
          console.debug({ wordle: this })
        },
        submit() {
          const { gameOver, result, solution } = this
          if (gameOver) return this.notify(`You ${result}! Solution was "${solution}"`)
          const { word, wordLength, words } = this
          if (word.length < wordLength || !words.has(word))
            return this.notify(`"${word.padEnd(wordLength, '.')}"" is not a valid word`)

          const { wordLetters, keyboardKeys } = this
          const i = (this.i += 1) // Word accepted
          const keys = Object.fromEntries(keyboardKeys.map(key => [key.textContent[0].toLowerCase(), key]))
          for (let j = 0; j < wordLetters.length; j++) {
            const divs = [wordLetters[j], keys[word[j]]]
            const tokens = [
              [/* */ 'submitted', true],
              [/*      */ 'used', solution.includes(word[j])],
              [/*   */ 'correct', solution[j] === word[j]],
            ]
            for (const div of divs)
              for (const [token, tokenOn] of tokens) //
                if (tokenOn) div.classList.add(token)
          }
          if (word === solution) {
            ;[this.i, this.j, this.result] = [wordsCount, 0, 'won']
            return this.notify(`You ${this.result}! Solution was "${solution}"`)
          }
          if (i >= wordsCount) {
            ;[this.i, this.j, this.result] = [wordsCount, 0, 'lost']
            return this.notify(`You ${this.result}! Solution was "${solution}"`)
          }
        },
      })

      const wordle = makeWordleGame()
      wordle.reset()

      function generalButtonOnClick(event) {
        if (!(event instanceof PointerEvent)) throw new Error('Not a PointerEvent')
        if (!(event.target instanceof HTMLButtonElement)) throw new Error('Not from a <button>')
        const buttonBehavior = event.target.textContent.toLowerCase()
        const command = {
          submit: () => wordle.submit(),
          clear: () => wordle.gameOver || (wordle.word = ''),
          reset: () => wordle.reset(),
        }[buttonBehavior]
        if (command) return command()
        if (/^[a-z]$/.test(buttonBehavior)) {
          const { gameOver, word, wordLength } = wordle
          if (!gameOver && word.length < wordLength) {
            wordle.word = wordle.word + buttonBehavior[0]
          }
        }
        if (/^←$/.test(buttonBehavior)) {
          if (!wordle.gameOver) wordle.word = ''
        }
      }
      function documentOnKey(event) {
        if (!(event instanceof KeyboardEvent)) throw new Error('Not a KeyboardEvent')
        if (/^[a-zA-z]$/.test(event.key)) {
          const { gameOver, word, wordLength } = wordle
          if (!gameOver && word.length < wordLength) {
            wordle.word = wordle.word + event.key[0]
          }
        }
        if (/^Enter$/.test(event.key)) {
          if (wordle.gameOver) wordle.reset()
          else wordle.submit()
        }
        if (/^Backspace$/.test(event.key)) {
          const { gameOver, word } = wordle
          if (!gameOver && word) wordle.word = word.substr(0, word.length - 1)
        }
      }
    </script>
  </head>
  <body>
    <div id="wordle">
      <div class="border">
        <header>Guess the Word</header>
        <ol class="letters" data-active-word-index="3">
          <li class="loader">Loading Words</li>
        </ol>
        <div class="notify">Guess the Word</div>
        <div class="keyboard">
          <div class="loader">Loading Keyboard</div>
        </div>
        <div class="buttons">
          <button>Submit</button>
          <button>Clear</button>
          <button>Reset</button>
        </div>
      </div>
    </div>
  </body>
</html>
